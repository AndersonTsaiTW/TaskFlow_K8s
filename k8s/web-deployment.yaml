apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-web
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-web
  template:
    metadata:
      labels:
        app: taskflow-web
    spec:
      containers:
        - name: web
          image: __WEB_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-web
  namespace: taskflow
spec:
  selector:
    app: taskflow-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
