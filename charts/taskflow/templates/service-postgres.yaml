{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: taskflow-postgres
spec:
  selector:
    app: taskflow-postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.port | default 5432 }}
      targetPort: {{ .Values.postgres.port | default 5432 }}
  type: ClusterIP
{{- end }}
