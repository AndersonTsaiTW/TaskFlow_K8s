apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-web
  labels:
    app: taskflow-web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: taskflow-web
  template:
    metadata:
      labels:
        app: taskflow-web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.web.containerPort | quote }}
          ports:
            - containerPort: {{ .Values.web.containerPort }}
