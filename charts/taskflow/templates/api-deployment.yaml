apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-api
  template:
    metadata:
      labels:
        app: taskflow-api
    spec:
      containers:
        - name: api
          image: __API_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://postgres:postgres@taskflow-postgres:5432/taskflow
            - name: DB_HOST
              value: taskflow-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: taskflow
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow
spec:
  selector:
    app: taskflow-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
