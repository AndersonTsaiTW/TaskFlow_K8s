namespace: taskflow

imagePullSecrets: []

api:
  replicaCount: 1
  image:
    repository: <YOUR_ECR_URI>/taskflow/api
    tag: v1
    pullPolicy: IfNotPresent
  containerPort: 8000
  service:
    port: 8000

web:
  replicaCount: 1
  image:
    repository: <YOUR_ECR_URI>/taskflow/web
    tag: v1
    pullPolicy: IfNotPresent
  containerPort: 3000
  service:
    port: 3000

postgres:
  enabled: true
  image: postgres:16-alpine
  port: 5432
  storage: 1Gi

config:
  dbHost: taskflow-postgres
  dbPort: "5432"
  dbName: taskflow
  dbUser: postgres

secret:
  dbPassword: "postgres"
  jwtSecret: "change-me"

ingress:
  enabled: false
  className: ""
  host: taskflow.local
  path: /
  pathType: Prefix