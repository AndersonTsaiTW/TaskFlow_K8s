name: PR Kind Integration

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Hurl
        run: |
          curl --location --silent --output hurl.deb https://github.com/Orange-OpenSource/hurl/releases/download/4.2.0/hurl_4.2.0_amd64.deb
          sudo dpkg -i hurl.deb

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: taskflow-ci

      - name: Install yq
        run: |
          sudo curl -sSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Parse Image Configuration
        id: parse_images
        run: |
          API_ACCT=$(yq -r '.images.api.account' config/image-versions.yaml)
          API_REG=$(yq -r '.images.api.region' config/image-versions.yaml)
          API_REPO=$(yq -r '.images.api.repository' config/image-versions.yaml)
          API_TAG=$(yq -r '.images.api.tag' config/image-versions.yaml)
          
          WEB_ACCT=$(yq -r '.images.web.account' config/image-versions.yaml)
          WEB_REG=$(yq -r '.images.web.region' config/image-versions.yaml)
          WEB_REPO=$(yq -r '.images.web.repository' config/image-versions.yaml)
          WEB_TAG=$(yq -r '.images.web.tag' config/image-versions.yaml)

          API_IMAGE="${API_ACCT}.dkr.ecr.${API_REG}.amazonaws.com/${API_REPO}:${API_TAG}"
          WEB_IMAGE="${WEB_ACCT}.dkr.ecr.${WEB_REG}.amazonaws.com/${WEB_REPO}:${WEB_TAG}"

          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"
          
          echo "api_acct=${API_ACCT}" >> "$GITHUB_OUTPUT"
          echo "api_reg=${API_REG}" >> "$GITHUB_OUTPUT"
          
          echo "web_acct=${WEB_ACCT}" >> "$GITHUB_OUTPUT"
          echo "web_reg=${WEB_REG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials for API (Your AWS Account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ steps.parse_images.outputs.api_reg }}
          role-to-assume: arn:aws:iam::${{ steps.parse_images.outputs.api_acct }}:role/github-actions-ecr-push-role

      - name: Pull and Load API Image
        run: |
          aws ecr get-login-password --region ${{ steps.parse_images.outputs.api_reg }} | docker login --username AWS --password-stdin ${{ steps.parse_images.outputs.api_acct }}.dkr.ecr.${{ steps.parse_images.outputs.api_reg }}.amazonaws.com
          docker pull ${{ steps.parse_images.outputs.api_image }}
          kind load docker-image ${{ steps.parse_images.outputs.api_image }} --name taskflow-ci

      - name: Configure AWS Credentials for Web (Partner AWS Account)
        if: steps.parse_images.outputs.api_acct != steps.parse_images.outputs.web_acct
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ steps.parse_images.outputs.web_reg }}
          role-to-assume: arn:aws:iam::${{ steps.parse_images.outputs.api_acct }}:role/github-actions-ecr-push-role
          # Note: Adjust role-to-assume if the IAM structure differs for Partner pulling.

      - name: Pull and Load Web Image
        run: |
          aws ecr get-login-password --region ${{ steps.parse_images.outputs.web_reg }} | docker login --username AWS --password-stdin ${{ steps.parse_images.outputs.web_acct }}.dkr.ecr.${{ steps.parse_images.outputs.web_reg }}.amazonaws.com
          docker pull ${{ steps.parse_images.outputs.web_image }}
          kind load docker-image ${{ steps.parse_images.outputs.web_image }} --name taskflow-ci

      - name: Render K8s Manifests
        run: |
          mkdir -p .rendered/k8s
          cp k8s/*.yaml .rendered/k8s/
          # Replace placeholders with exact image URIs
          sed -i "s|__API_IMAGE__|${{ steps.parse_images.outputs.api_image }}|g" .rendered/k8s/api-deployment.yaml
          sed -i "s|__WEB_IMAGE__|${{ steps.parse_images.outputs.web_image }}|g" .rendered/k8s/web-deployment.yaml

      - name: Apply Manifests
        run: |
          kubectl apply -f .rendered/k8s/namespace.yaml
          kubectl apply -f .rendered/k8s/postgres.yaml
          kubectl apply -f .rendered/k8s/api-deployment.yaml
          kubectl apply -f .rendered/k8s/web-deployment.yaml

      - name: Wait for Pods to be Ready
        run: |
          kubectl wait --for=condition=ready pod -l app=taskflow-postgres -n taskflow --timeout=120s
          kubectl wait --for=condition=ready pod -l app=taskflow-api -n taskflow --timeout=120s

      - name: Run Smoke Tests (Hurl)
        run: |
          kubectl -n taskflow port-forward svc/taskflow-api 8000:8000 &
          sleep 5
          bash scripts/run-ci-tests.sh