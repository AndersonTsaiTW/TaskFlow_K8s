name: Sync partner web image to our ECR

on:
  workflow_dispatch:
    inputs:
      partner_image_tag:
        description: Partner image tag to sync
        required: true
        default: v1.0.6

permissions:
  id-token: write
  contents: read

env:
  PARTNER_REGION: us-east-1
  PARTNER_REGISTRY: 692735150780.dkr.ecr.us-east-1.amazonaws.com
  PARTNER_REPOSITORY: taskflow/web

  MY_REGION: ca-central-1
  MY_REGISTRY: 485104726319.dkr.ecr.ca-central-1.amazonaws.com
  MY_REPOSITORY: taskflow/web

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.MY_REGION }}
          role-to-assume: arn:aws:iam::485104726319:role/github-actions-ecr-push-role

      - name: Resolve image URIs
        id: vars
        shell: bash
        run: |
          TAG="${{ inputs.partner_image_tag }}"
          echo "partner_image=${PARTNER_REGISTRY}/${PARTNER_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "my_image=${MY_REGISTRY}/${MY_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to partner ECR
        run: |
          aws ecr get-login-password --region "$PARTNER_REGION" \
          | docker login --username AWS --password-stdin "$PARTNER_REGISTRY"

      - name: Pull partner image
        run: docker pull "${{ steps.vars.outputs.partner_image }}"

      - name: Login to our ECR
        run: |
          aws ecr get-login-password --region "$MY_REGION" \
          | docker login --username AWS --password-stdin "$MY_REGISTRY"

      - name: Tag image for our ECR
        run: docker tag "${{ steps.vars.outputs.partner_image }}" "${{ steps.vars.outputs.my_image }}"

      - name: Push to our ECR
        run: docker push "${{ steps.vars.outputs.my_image }}"

      - name: Summary
        run: |
          echo "Synced image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: ${{ steps.vars.outputs.partner_image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ steps.vars.outputs.my_image }}" >> "$GITHUB_STEP_SUMMARY"
